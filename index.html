<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MLBB Builds & Counters</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Oxanium:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#02020a;color:#e0e0ff;font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── CANVAS BG ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── FLOATING ORBS ── */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:drift 20s ease-in-out infinite}
.orb1{width:500px;height:500px;background:radial-gradient(#7c3aed44,transparent 70%);top:-100px;left:-100px;animation-duration:25s}
.orb2{width:400px;height:400px;background:radial-gradient(#f59e0b33,transparent 70%);top:30%;right:-80px;animation-duration:18s;animation-delay:-8s}
.orb3{width:350px;height:350px;background:radial-gradient(#06b6d433,transparent 70%);bottom:-80px;left:30%;animation-duration:22s;animation-delay:-14s}
.orb4{width:300px;height:300px;background:radial-gradient(#ef444422,transparent 70%);bottom:20%;right:20%;animation-duration:30s;animation-delay:-5s}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(60px,-40px) scale(1.1)}
  50%{transform:translate(-30px,60px) scale(.9)}
  75%{transform:translate(40px,30px) scale(1.05)}
}

/* ── GRID OVERLAY ── */
body::after{content:'';position:fixed;inset:0;background-image:
  linear-gradient(rgba(124,58,237,.06) 1px,transparent 1px),
  linear-gradient(90deg,rgba(124,58,237,.06) 1px,transparent 1px);
  background-size:50px 50px;pointer-events:none;z-index:0;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#02020a}
::-webkit-scrollbar-thumb{background:linear-gradient(#f59e0b,#7c3aed);border-radius:3px}

/* ── HEADER ── */
header{position:relative;z-index:10;background:linear-gradient(135deg,#06020f 0%,#0e0520 50%,#060d1e 100%);padding:20px 36px;border-bottom:1px solid #ffffff08;display:flex;align-items:center;gap:18px;box-shadow:0 8px 60px #000e}
header::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#7c3aed08,#f59e0b06,#06b6d408);pointer-events:none}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,#7c3aed 25%,#f59e0b 50%,#06b6d4 75%,transparent 100%);animation:shimmer 4s linear infinite;background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.hlogo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:1.8rem;box-shadow:0 0 40px #f59e0b66,0 0 80px #7c3aed44;flex-shrink:0;animation:logopulse 3s ease-in-out infinite;position:relative}
.hlogo::after{content:'';position:absolute;inset:-2px;border-radius:18px;background:linear-gradient(135deg,#f59e0b,#7c3aed,#06b6d4);z-index:-1;opacity:.5;animation:rotate 6s linear infinite}
@keyframes logopulse{0%,100%{box-shadow:0 0 40px #f59e0b66,0 0 80px #7c3aed44}50%{box-shadow:0 0 60px #f59e0baa,0 0 120px #7c3aed88}}
@keyframes rotate{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
.htitle{font-family:'Oxanium',sans-serif;font-size:1.9rem;font-weight:800;background:linear-gradient(90deg,#f59e0b,#fbbf24,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;text-transform:uppercase;filter:drop-shadow(0 0 20px #f59e0b44)}
.hsub{color:#3a3a6a;font-size:.76rem;margin-top:3px;letter-spacing:2px;text-transform:uppercase}
.hbadge{margin-left:auto;background:linear-gradient(135deg,#f59e0b22,#7c3aed22);border:1px solid #f59e0b44;border-radius:20px;padding:7px 16px;font-size:.72rem;color:#fbbf24;font-weight:700;letter-spacing:1px;font-family:'Oxanium',sans-serif;box-shadow:0 0 20px #f59e0b22;animation:badgepulse 3s ease-in-out infinite}
@keyframes badgepulse{0%,100%{box-shadow:0 0 20px #f59e0b22}50%{box-shadow:0 0 30px #f59e0b55}}

/* ── TABS ── */
.tabs{position:relative;z-index:10;display:flex;gap:6px;padding:14px 36px 0;background:#04041000}
.tab{padding:11px 26px;border-radius:12px 12px 0 0;cursor:pointer;font-weight:700;font-size:.88rem;border:none;transition:all .25s;font-family:'Oxanium',sans-serif;letter-spacing:1px}
.tab.active{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;box-shadow:0 -4px 30px #f59e0b66;text-shadow:none}
.tab:not(.active){background:#0a0a1800;color:#3a3a6a;border:1px solid #1a1a3a;border-bottom:none;backdrop-filter:blur(10px)}
.tab:not(.active):hover{background:#1a1a3a44;color:#f59e0b;border-color:#f59e0b44}

/* ── CONTENT ── */
.content{position:relative;z-index:5;padding:28px 36px;max-width:1600px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* ── FILTERS ── */
.filters{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-wrap::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.85rem;pointer-events:none;z-index:1}
.search-box{width:100%;padding:11px 16px 11px 42px;border-radius:14px;border:1px solid #1a1a3a;background:#08081888;color:#e0e0ff;font-size:.92rem;outline:none;font-family:'Rajdhani',sans-serif;transition:all .25s;backdrop-filter:blur(10px)}
.search-box:focus{border-color:#f59e0b;box-shadow:0 0 0 3px #f59e0b22,0 0 30px #f59e0b22}
.role-btn{padding:8px 18px;border-radius:20px;border:1px solid #1a1a3a;background:#08081888;color:#4a4a8a;cursor:pointer;font-size:.78rem;font-weight:700;transition:all .2s;font-family:'Oxanium',sans-serif;letter-spacing:.5px;backdrop-filter:blur(10px)}
.role-btn.active{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;border-color:transparent;box-shadow:0 4px 20px #f59e0b55;font-weight:800}
.role-btn:hover:not(.active){border-color:#f59e0b66;color:#fbbf24;background:#1a1a3a88}
.hcount{color:#2a2a5a;font-size:.75rem;margin-left:auto;font-weight:600;font-family:'Oxanium',sans-serif}

/* ── HERO GRID ── */
.hero-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px}
.hero-card{border-radius:16px;cursor:pointer;transition:all .3s cubic-bezier(.175,.885,.32,1.275);overflow:hidden;border:1px solid #1a1a3500;background:linear-gradient(160deg,#0c0c1e,#080812);position:relative;box-shadow:0 4px 20px #0008}
.hero-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#ffffff0a,transparent 60%);pointer-events:none;z-index:5;border-radius:16px}
.hero-card::after{content:'';position:absolute;inset:0;border-radius:16px;border:1px solid transparent;background:transparent padding-box,linear-gradient(135deg,#2a2a4a,#1a1a3a) border-box;pointer-events:none;z-index:8;transition:all .3s}
.hero-card:hover::after{background:transparent padding-box,linear-gradient(135deg,#f59e0b,#7c3aed,#06b6d4) border-box}
.hero-card:hover{transform:translateY(-8px) scale(1.03);box-shadow:0 20px 60px #f59e0b33,0 0 40px #7c3aed22}

/* ── PORTRAIT ── */
.portrait{width:100%;aspect-ratio:3/4;position:relative;overflow:hidden}
.p-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3rem;z-index:1;pointer-events:none}
.p-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;z-index:2;transition:transform .4s ease}
.hero-card:hover .p-img{transform:scale(1.08)}
.p-img.err{display:none}
.p-grad{position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(transparent,rgba(2,2,10,.97));z-index:3;pointer-events:none}
.p-shine{position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.07) 50%,transparent 60%);z-index:4;transform:translateX(-100%);transition:transform .5s ease;pointer-events:none}
.hero-card:hover .p-shine{transform:translateX(100%)}
.p-pip{position:absolute;top:8px;left:8px;padding:3px 9px;border-radius:6px;font-size:.52rem;font-weight:800;z-index:7;letter-spacing:1px;font-family:'Oxanium',sans-serif}
.p-name-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px 10px 10px;z-index:7}
.p-hero-name{font-size:.82rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 10px #000}
.p-role-tag{font-size:.58rem;color:#fbbf24;margin-top:2px;font-weight:600;letter-spacing:.3px}
.hero-info{display:none}

/* ── MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,8,.88);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(16px)}
.moverlay.hidden{display:none}
.modal{background:linear-gradient(160deg,#0a0a1e,#060610);border-radius:22px;width:100%;max-width:760px;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 40px 120px #000f,0 0 0 1px #ffffff08,0 0 60px #f59e0b11}
.modal::before{content:'';position:absolute;inset:0;border-radius:22px;border:1px solid transparent;background:linear-gradient(#0a0a1e,#060610) padding-box,linear-gradient(135deg,#f59e0b55,#7c3aed55,#06b6d455) border-box;pointer-events:none;z-index:0}
.mclose{position:absolute;top:14px;right:14px;background:#1a1a3a;border:1px solid #2a2a5a;color:#888;border-radius:10px;width:34px;height:34px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;z-index:100;transition:all .2s}
.mclose:hover{background:#ef444433;color:#f87171;border-color:#ef444455;box-shadow:0 0 20px #ef444433}
.mbanner{position:relative;height:220px;overflow:hidden;border-radius:22px 22px 0 0}
.mb-emoji{position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:7rem;filter:drop-shadow(0 4px 20px #000c);z-index:1}
.mb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;z-index:2}
.mb-img.err{display:none}
.mb-grad{position:absolute;inset:0;z-index:3;pointer-events:none}
.mb-info{position:absolute;bottom:0;left:0;padding:22px 24px;z-index:4}
.mb-name{font-size:2.2rem;font-weight:800;text-shadow:0 2px 20px #000;font-family:'Oxanium',sans-serif;letter-spacing:2px;background:linear-gradient(90deg,#fff,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mb-roles{display:flex;gap:6px;margin-top:7px}
.rbadge{display:inline-block;padding:4px 12px;border-radius:10px;font-size:.65rem;font-weight:700;letter-spacing:1px;font-family:'Oxanium',sans-serif}
.mbody{padding:24px;position:relative;z-index:1}
.stitle{font-size:.7rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin:20px 0 14px;display:flex;align-items:center;gap:10px;font-family:'Oxanium',sans-serif;color:#f59e0b}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#f59e0b44,transparent)}

/* ── ITEM CARDS ── */
.build-grid{display:flex;gap:10px;flex-wrap:wrap}
.icard{width:88px;border-radius:12px;overflow:hidden;flex-shrink:0;background:#08081888;cursor:default;transition:all .25s;position:relative;border:1px solid #1a1a3a;backdrop-filter:blur(6px)}
.icard:hover{transform:translateY(-5px) scale(1.06);border-color:#f59e0b88;box-shadow:0 10px 30px #f59e0b33}
.ip{width:88px;height:88px;position:relative;overflow:hidden;background:#0a0a1a;display:flex;align-items:center;justify-content:center}
.ip-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2rem;z-index:1}
.ip-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}
.ip-img.err{display:none}
.ilabel{padding:5px 4px 7px;text-align:center;background:#06061288}
.iname{font-size:.6rem;color:#dde;line-height:1.2;font-weight:700}
.itype{font-size:.52rem;color:#f59e0b;margin-top:2px;font-weight:700;letter-spacing:.3px}

/* ── MATCHUPS ── */
.ccols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.clist{background:#06061288;border:1px solid #1a1a3a;border-radius:14px;padding:16px;backdrop-filter:blur(6px)}
.clist h4{font-size:.78rem;font-weight:800;margin-bottom:12px;font-family:'Oxanium',sans-serif;letter-spacing:1px}
.ctag{display:inline-block;background:#0d0d2288;border:1px solid #2a2a4a;border-radius:8px;padding:4px 11px;font-size:.7rem;margin:3px;color:#ccc;transition:all .2s;backdrop-filter:blur(4px)}
.ctag:hover{border-color:#f59e0b66;color:#fbbf24;background:#1a1a3a88}
.cirow{display:flex;align-items:center;gap:12px;background:#06061288;border:1px solid #1a1a3a;border-radius:12px;padding:11px 14px;margin:7px 0;transition:all .2s;backdrop-filter:blur(6px)}
.cirow:hover{border-color:#f59e0b44;background:#0d0d2288;box-shadow:0 4px 20px #f59e0b11}
.cibox{width:48px;height:48px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#0a0a1a;position:relative;display:flex;align-items:center;justify-content:center;border:1px solid #2a2a4a}
.cibox-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;z-index:1}
.cibox-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}
.cibox-img.err{display:none}
.ciname{font-weight:800;font-size:.84rem;color:#34d399;font-family:'Oxanium',sans-serif}
.ciwhy{font-size:.68rem;color:#4a6a7a;margin-top:3px;line-height:1.4}

/* ── COUNTER BUILD GRID ── */
.cb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.cb-item{border-radius:12px;border:1px solid #1a1a3a;background:#08081888;overflow:hidden;transition:all .2s;backdrop-filter:blur(6px);cursor:default}
.cb-item:hover{transform:translateY(-3px);box-shadow:0 8px 24px #0008}
.cb-img-wrap{position:relative;width:100%;aspect-ratio:1;background:#0a0a1a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cb-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;z-index:1}
.cb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}
.cb-label{padding:6px 6px 7px;background:#04040e88}
.cb-name{font-size:.6rem;font-weight:700;color:#dde;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cb-type{font-size:.52rem;font-weight:700;margin-top:2px;letter-spacing:.3px}

/* ── COUNTER TOOL ── */
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.panel{background:#04040e88;border:1px solid #1a1a3a;border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:0 8px 40px #0008;backdrop-filter:blur(10px)}
.panel h3{font-size:.95rem;font-weight:800;margin-bottom:14px;font-family:'Oxanium',sans-serif;letter-spacing:1px}
.eslot{display:flex;align-items:center;gap:10px;background:#08081888;border:1px dashed #2a2a4a;border-radius:12px;padding:10px 14px;margin-bottom:8px;transition:all .2s}
.eslot.filled{border-style:solid;border-color:#ef444466;background:#1a080888;box-shadow:0 0 20px #ef444411}
.sthumb{width:36px;height:36px;border-radius:9px;overflow:hidden;flex-shrink:0;background:#0a0a1a;position:relative;display:flex;align-items:center;justify-content:center;font-size:1.1rem;border:1px solid #2a2a4a}
.sthumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;z-index:2}
.sthumb-img.err{display:none}
.sthumb-e{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1}
.sname{flex:1;font-size:.84rem;font-weight:700;color:#ccc}
.rbtn{background:none;border:none;color:#ef4444;cursor:pointer;font-size:.9rem;opacity:.5;transition:all .2s}
.rbtn:hover{opacity:1;text-shadow:0 0 10px #ef4444}
.minigrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:8px;max-height:340px;overflow-y:auto;padding:4px}
.minicard{border-radius:10px;cursor:pointer;transition:all .2s;overflow:hidden;border:1px solid #1a1a35;background:linear-gradient(160deg,#0c0c1e,#080812)}
.minicard:hover:not(.dis){transform:scale(1.07);border-color:#ef444499;box-shadow:0 6px 20px #ef444433}
.minicard.dis{opacity:.2;pointer-events:none}
.mthumb{width:100%;aspect-ratio:1;position:relative;overflow:hidden;background:#0a0a1a;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.mthumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;z-index:2}
.mthumb-img.err{display:none}
.mthumb-e{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1}
.mname{padding:4px;text-align:center;font-size:.58rem;color:#888;font-weight:700;background:#04040e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crec{background:linear-gradient(135deg,#06120688,#04090488);border:1px solid #1a3a1a;border-radius:14px;padding:14px 16px;margin-bottom:10px;transition:all .2s;backdrop-filter:blur(6px)}
.crec:hover{border-color:#34d39955;box-shadow:0 6px 24px #34d39911}
.crec-h{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.crecbox{width:42px;height:42px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#0a0a1a;position:relative;display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:1px solid #1e3a1e}
.crecbox-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}
.crecbox-img.err{display:none}
.crecname{font-weight:800;font-size:.9rem;color:#34d399;flex:1;font-family:'Oxanium',sans-serif}
.prio{font-size:.6rem;padding:3px 9px;border-radius:10px;font-weight:800;font-family:'Oxanium',sans-serif;letter-spacing:.5px}
.ph{background:#ef444422;color:#f87171;border:1px solid #ef444455}
.pm{background:#f9731622;color:#fb923c;border:1px solid #f9731655}
.crecreason{font-size:.7rem;color:#3a6a4a;line-height:1.5}
.empty{text-align:center;padding:40px 16px;color:#2a2a4a;font-family:'Oxanium',sans-serif}
.empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.3}
.tip{margin-top:14px;padding:13px 16px;background:#08081888;border:1px solid #1a1a3a;border-radius:12px;font-size:.72rem;color:#4a4a8a;line-height:1.6;border-left:3px solid #f59e0b;backdrop-filter:blur(6px)}

@media(max-width:768px){
  .twocol,.ccols{grid-template-columns:1fr}
  .hero-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
  .content{padding:16px 14px}
  header{padding:14px 18px}
  .htitle{font-size:1.3rem}
  .tabs{padding:10px 18px 0}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="orb orb4"></div>
<header>
  <div class="hlogo">⚔️</div>
  <div>
    <div class="htitle">MLBB Builds &amp; Counters</div>
    <div class="hsub">Meta Builds · Hero Matchups · Counter Items</div>
  </div>
  <div class="hbadge">⚡ Season 2026</div>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('builds')">🗡️ Hero Builds</button>
  <button class="tab" onclick="switchTab('counter')">🛡️ Counter Tool</button>
</div>
<div class="content">
  <div id="page-builds" class="page active">
    <div class="filters">
      <div class="search-wrap"><input class="search-box" id="hs" placeholder="Search hero..." oninput="renderH()"/></div>
      <div id="rf" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <span class="hcount" id="hc"></span>
    </div>
    <div class="hero-grid" id="hg"></div>
  </div>
  <div id="page-counter" class="page">
    <div class="twocol">
      <div>
        <div class="panel" style="border-color:#3b82f633;box-shadow:0 0 30px #3b82f611">
          <h3 style="color:#60a5fa">🔵 Your Hero <span style="font-size:.7rem;color:#444;font-weight:400">(the hero you're playing)</span></h3>
          <div id="myhero-slot"></div>
          <div id="myhero-picker">
            <input class="search-box" id="mhs" placeholder="🔍 Search your hero..." oninput="renderMHG()" style="width:100%;margin-bottom:10px"/>
            <div class="minigrid" id="mhg"></div>
          </div>
        </div>
        <div class="panel">

// ── TAB ───────────────────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['builds','counter'][i]===t));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
}

// ── FILTERS ───────────────────────────────────────────────────────
function renderRF(){
  document.getElementById('rf').innerHTML=ROLES.map(r=>
    `<button class="role-btn${r===roleFilter?' active':''}" onclick="setRole('${r}')">${r}</button>`
  ).join('');
}
function setRole(r){roleFilter=r;renderRF();renderH();}

// ── HERO GRID ─────────────────────────────────────────────────────
function renderH(){
  const q=document.getElementById('hs').value.toLowerCase();
  const list=heroList.filter(h=>h.name.toLowerCase().includes(q)&&(roleFilter==='All'||h.roles.includes(roleFilter)));
  document.getElementById('hc').textContent=`${list.length} heroes`;
  document.getElementById('hg').innerHTML=list.map(h=>{
    const s=rs(h);
    return `<div class="hero-card" onclick="openM('${h.name.replace(/'/g,"\\'")}')">
      <div class="portrait" style="background:${s.grad}">
        <div class="p-emoji">${h.icon}</div>
        ${hSrc(h.wn)?`<img class="p-img" src="${hSrc(h.wn)}" alt="${h.name}" loading="lazy" onerror="hErr(this,'${h.wn.replace(/'/g,"\\'")}')">`:''}
        <div class="p-grad"></div>
        <div class="p-pip" style="background:${s.pipbg};color:${s.pip}">${s.lbl}</div>
        <div class="p-name-overlay">
          <div class="p-hero-name">${h.name}</div>
          <div class="p-role-tag">${h.roles.join(' · ')}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────
function openM(name){
  const h=heroList.find(x=>x.name===name);
  if(!h)return;
  const s=rs(h);
  const buildHtml=h.build.map(item=>`
    <div class="icard" title="${item.n}">
      <div class="ip">
        <div class="ip-emoji">${item.e}</div>
        <img class="ip-img" src="${iSrc(item.n)}" alt="${item.n}" loading="lazy" onerror="iErr(this,'${item.n}',0)">
      </div>
      <div class="ilabel">
        <div class="iname">${item.n}</div>
        <div class="itype">${item.t}</div>
      </div>
    </div>`).join('');
  const ciHtml=h.ci.map(ci=>`
    <div class="cirow">
      <div class="cibox">
        <div class="cibox-emoji">${ci.e}</div>
        <img class="cibox-img" src="${iSrc(ci.n)}" alt="${ci.n}" loading="lazy" onerror="iErr(this,'${ci.n}',0)">
      </div>
      <div><div class="ciname">${ci.n}</div><div class="ciwhy">${ci.w}</div></div>
    </div>`).join('');
  document.getElementById('mc').innerHTML=`
    <div class="mbanner" style="background:${s.grad}">
      <div class="mb-emoji">${h.icon}</div>
      ${hSrc(h.wn)?`<img class="mb-img" src="${hSrc(h.wn)}" alt="${h.name}" loading="lazy" onerror="hErr(this,'${h.wn.replace(/'/g,"\\'")}')">`:''}
      <div class="mb-grad" style="background:linear-gradient(90deg,${s.pipbg}f0 30%,transparent 70%),linear-gradient(0deg,rgba(0,0,15,.8),transparent)"></div>
      <div class="mb-info">
        <div class="mb-name">${h.name}</div>
        <div class="mb-roles">${h.roles.map(r=>`<span class="rbadge" style="background:${RS[r]?.pipbg||'#222'};color:${RS[r]?.pip||'#aaa'};border:1px solid ${RS[r]?.pip||'#444'}44">${r}</span>`).join('')}</div>
      </div>
    </div>
    <div class="mbody">
      <div class="stitle" style="color:#a855f7">⚔️ Best Build — Current Meta</div>
      <div class="build-grid">${buildHtml}</div>
      <div class="stitle" style="color:#4aff88;margin-top:18px">🏆 Matchups</div>
      <div class="ccols">
        <div class="clist"><h4 style="color:#4aff88">✅ Strong Against</h4>${h.strong.map(x=>`<span class="ctag">✔ ${x}</span>`).join('')||'<span style="color:#333">— general pick</span>'}</div>
        <div class="clist"><h4 style="color:#ff4a4a">❌ Weak Against</h4>${h.weak.map(x=>`<span class="ctag">✘ ${x}</span>`).join('')||'<span style="color:#333">— general pick</span>'}</div>
      </div>
      <div class="stitle" style="color:#ff8844;margin-top:18px">🛡️ How to Counter ${h.name}</div>
      ${ciHtml}
    </div>`;
  document.getElementById('mo').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function closeM(){document.getElementById('mo').classList.add('hidden');document.body.style.overflow='';}
function closeOut(e){if(e.target===document.getElementById('mo'))closeM();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});

// ── YOUR HERO ─────────────────────────────────────────────────────
function setMyHero(name){
  myHero=heroList.find(h=>h.name===name)||null;
  renderMyHeroSlot();
  renderMHG();
  renderCR();
}
function clearMyHero(){myHero=null;renderMyHeroSlot();renderMHG();renderCR();}

function renderMyHeroSlot(){
  const slot=document.getElementById('myhero-slot');
  const picker=document.getElementById('myhero-picker');
  if(myHero){
    const s=rs(myHero);
    slot.innerHTML=`<div class="eslot filled" style="border-color:#3b82f666;background:#08101888;box-shadow:0 0 20px #3b82f611">
      <div class="sthumb" style="background:${s.grad}">
        <span class="sthumb-e">${myHero.icon}</span>
        ${hSrc(myHero.wn)?`<img class="sthumb-img" src="${hSrc(myHero.wn)}" alt="${myHero.name}" loading="lazy" onerror="hErr(this,'${myHero.wn.replace(/'/g,"\\'")}')">`:''}
      </div>
      <span class="sname" style="color:#93c5fd">${myHero.name}</span>
      <span style="font-size:.6rem;color:${s.pip}">${myHero.roles.join(' · ')}</span>
      <button class="rbtn" style="color:#60a5fa" onclick="clearMyHero()">✕</button>
    </div>`;
    picker.style.display='none';
  } else {
    slot.innerHTML=`<div class="eslot" style="cursor:pointer;border-color:#3b82f633" onclick="document.getElementById('myhero-picker').style.display='block';document.getElementById('mhs').focus();renderMHG()">
      <div class="sthumb" style="background:#0a1020;border-color:#3b82f633;font-size:1.2rem">+</div>
      <span class="sname" style="color:#3b5a8a">Tap to pick your hero</span>
    </div>`;
    picker.style.display='block';
    renderMHG();
  }
}

function renderMHG(){
  const q=(document.getElementById('mhs').value||'').toLowerCase();
  document.getElementById('mhg').innerHTML=heroList.filter(h=>h.name.toLowerCase().includes(q)).map(h=>{
    const sel=myHero&&myHero.name===h.name;
    const s=rs(h);
    return`<div class="minicard${sel?' dis':''}" onclick="setMyHero('${h.name.replace(/'/g,"\\'")}')">
      <div class="mthumb" style="background:${s.grad}">
        <span class="mthumb-e">${h.icon}</span>
        ${hSrc(h.wn)?`<img class="mthumb-img" src="${hSrc(h.wn)}" alt="${h.name}" loading="lazy" onerror="hErr(this,'${h.wn.replace(/'/g,"\\'")}')">`:''}
      </div>
      <div class="mname">${h.name}</div>
    </div>`;
  }).join('');
}

// ── COUNTER TOOL ──────────────────────────────────────────────────
function addE(name){
  if(enemyTeam.length>=5||enemyTeam.find(h=>h.name===name))return;
  enemyTeam.push(heroList.find(h=>h.name===name));
  refresh();
}
function removeE(name){
  enemyTeam=enemyTeam.filter(h=>h.name!==name);
  refresh();
}
function refresh(){renderSlots();renderMG();renderCR();}

function renderSlots(){
  document.getElementById('eslots').innerHTML=[0,1,2,3,4].map(i=>{
    const h=enemyTeam[i];
    if(!h)return`<div class="eslot"><div class="sthumb">❓</div><span class="sname" style="color:#2a2a4a">Slot ${i+1}</span></div>`;
    const s=rs(h);
    return`<div class="eslot filled">
      <div class="sthumb" style="background:${s.grad}">
        <span class="sthumb-e">${h.icon}</span>
        ${hSrc(h.wn)?`<img class="sthumb-img" src="${hSrc(h.wn)}" alt="${h.name}" loading="lazy" onerror="hErr(this,'${h.wn.replace(/'/g,"\\'")}')">`:''}
      </div>
      <span class="sname">${h.name}</span>
      <span style="font-size:.6rem;color:${s.pip}">${h.roles[0]}</span>
      <button class="rbtn" onclick="removeE('${h.name.replace(/'/g,"\\'")}')">✕</button>
    </div>`;
  }).join('');
}

  const q=document.getElementById('es').value.toLowerCase();
  document.getElementById('mg').innerHTML=heroList.filter(h=>h.name.toLowerCase().includes(q)).map(h=>{
    const dis=!!enemyTeam.find(e=>e.name===h.name)||enemyTeam.length>=5;
    const s=rs(h);
    return`<div class="minicard${dis?' dis':''}" onclick="addE('${h.name.replace(/'/g,"\\'")}')">
      <div class="mthumb" style="background:${s.grad}">
        <span class="mthumb-e">${h.icon}</span>
        ${hSrc(h.wn)?`<img class="mthumb-img" src="${hSrc(h.wn)}" alt="${h.name}" loading="lazy" onerror="hErr(this,'${h.wn.replace(/'/g,"\\'")}')">`:''}
      </div>
      <div class="mname">${h.name}</div>
    </div>`;
  }).join('');
}

function scoreCounterItems(){
  const sc={};
  const ROLE_CI={
    Tank:    [{e:'🌑',n:'Malefic Roar',w:'Armor pen shreds tank defense',p:'high'},{e:'💠',n:'Divine Glaive',w:'Magic pen vs tanky supports',p:'med'}],
    Fighter: [{e:'❄️',n:'Dominance Ice',w:'Cuts attack speed & crits',p:'high'},{e:'🧲',n:'Antique Cuirass',w:'Reduces burst physical damage',p:'high'}],
    Assassin:[{e:'🔵',n:"Athena's Shield",w:'Absorbs their burst combo',p:'high'},{e:'💀',n:'Immortality',w:'Second life after burst',p:'high'}],
    Mage:    [{e:'🌑',n:'Radiant Armor',w:'Reduces stacking magic damage',p:'high'},{e:'🔵',n:"Athena's Shield",w:'Absorbs magic burst window',p:'high'}],
    Marksman:[{e:'❄️',n:'Dominance Ice',w:'Reduces crit & attack speed',p:'high'},{e:'🛡️',n:'Blade Armor',w:'Returns crit damage to them',p:'med'}],
    Support: [{e:'⚡',n:'Necklace of Durance',w:'Cuts healing by 50%',p:'high'},{e:'🗡️',n:'Sea Halberd',w:'Reduces lifesteal on hit',p:'high'}],
  };
  enemyTeam.forEach(h=>{
    h.ci.forEach(ci=>{
      if(!sc[ci.n])sc[ci.n]={e:ci.e,n:ci.n,reasons:[],score:0,prio:'med'};
      sc[ci.n].reasons.push(`vs <b>${h.name}</b>: ${ci.w}`);
      sc[ci.n].score+=3;
    });
    h.roles.forEach(role=>{
      (ROLE_CI[role]||[]).forEach(r=>{
        if(!sc[r.n])sc[r.n]={e:r.e,n:r.n,reasons:[],score:0,prio:r.p};
        sc[r.n].reasons.push(`vs ${role} <b>${h.name}</b>: ${r.w}`);
        sc[r.n].score+=1;
        if(r.p==='high')sc[r.n].prio='high';
      });
    });
  });
  return Object.values(sc).sort((a,b)=>b.score-a.score);
}

function buildCounterBuild(hero){
  const ranked=scoreCounterItems();
  const base=[...hero.build]; // 6 items, index 0 = boots
  const inBuild=new Set(base.map(i=>i.n));
  // Counter items not already in the build
  const toInsert=ranked.filter(ci=>!inBuild.has(ci.n));
  // Build the final 6 slots
  const slots=base.map((item,idx)=>{
    const counterMatch=ranked.find(ci=>ci.n===item.n);
    return{...item,kind:counterMatch?'both':'core',reasons:counterMatch?counterMatch.reasons:[],prio:counterMatch?counterMatch.prio:'med'};
  });
  // Replace from slot 5 down (keep boots at 0), swapping in counter items
  let ins=0;
  for(let i=5;i>=1&&ins<toInsert.length;i--){
    if(slots[i].kind==='core'){
      const ci=toInsert[ins++];
      slots[i]={n:ci.n,e:ci.e,t:'Counter',kind:'counter',reasons:ci.reasons,prio:ci.prio};
    }
  }
  return slots;
}

function itemBox(item,idx){
  const isCounter=item.kind==='counter';
  const isBoth=item.kind==='both';
  const borderCol=isCounter?'#ef444466':isBoth?'#f59e0b66':'#1a1a3a';
  const glowCol=isCounter?'#ef444422':isBoth?'#f59e0b22':'none';
  const badge=isCounter?`<span style="position:absolute;top:3px;right:3px;background:#ef444488;color:#fff;font-size:.42rem;font-weight:800;padding:1px 4px;border-radius:4px;z-index:10;letter-spacing:.5px">COUNTER</span>`
    :isBoth?`<span style="position:absolute;top:3px;right:3px;background:#f59e0b88;color:#000;font-size:.42rem;font-weight:800;padding:1px 4px;border-radius:4px;z-index:10;letter-spacing:.5px">CORE+</span>`:'';
  const numBadge=`<span style="position:absolute;top:3px;left:3px;background:#000a;color:#888;font-size:.42rem;font-weight:800;padding:1px 4px;border-radius:4px;z-index:10">${idx+1}</span>`;
  return`<div class="cb-item" style="border-color:${borderCol};box-shadow:0 0 18px ${glowCol}" title="${item.n}${item.reasons.length?'\n'+item.reasons.map(r=>r.replace(/<[^>]+>/g,'')).join('\n'):''}">
    <div class="cb-img-wrap">
      ${numBadge}${badge}
      <span class="cb-emoji">${item.e}</span>
      <img class="cb-img" src="${iSrc(item.n)}" alt="${item.n}" loading="lazy" onerror="this.style.display='none'">
    </div>
    <div class="cb-label">
      <div class="cb-name">${item.n}</div>
      <div class="cb-type" style="color:${isCounter?'#f87171':isBoth?'#fbbf24':'#6b7280'}">${item.t}</div>
    </div>
  </div>`;
}

function renderCR(){
  const el=document.getElementById('cr');
  if(!enemyTeam.length){
    el.innerHTML=`<div class="empty"><div style="font-size:2rem;margin-bottom:10px">👈</div>${myHero?`<b style="color:#93c5fd">${myHero.name}</b> is ready — now pick enemy heroes`:'Pick your hero + enemy team to get a full counter build'}</div>`;
    return;
  }

  if(!myHero){
    // No hero selected: show top counter items as before
    const ranked=scoreCounterItems().slice(0,6);
    el.innerHTML=`<div style="margin-bottom:14px;padding:10px 12px;background:#1a100088;border:1px solid #f59e0b33;border-radius:10px;font-size:.74rem;color:#f59e0b">
      ⬆️ Pick <b>Your Hero</b> above for a personalized full build recommendation
    </div>`+ranked.map(item=>`
    <div class="crec">
      <div class="crec-h">
        <div class="crecbox"><span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1">${item.e}</span>
          <img class="crecbox-img" src="${iSrc(item.n)}" alt="${item.n}" loading="lazy" onerror="iErr(this,'${item.n}',0)"></div>
        <span class="crecname">${item.n}</span>
        <span class="prio ${item.prio==='high'?'ph':'pm'}">${item.prio==='high'?'🔴 HIGH':'🟡 MED'}</span>
      </div>
      <div class="crecreason">${[...new Set(item.reasons)].join('<br>')}</div>
    </div>`).join('')+
    `<div class="tip">💡 Select your hero above to get a full 6-item build tailored to counter this enemy team.</div>`;
    return;
  }

  // Full 6-item counter build
  const slots=buildCounterBuild(myHero);
  const counterCount=slots.filter(s=>s.kind==='counter').length;
  const bothCount=slots.filter(s=>s.kind==='both').length;

  // Reasoning section: only counter + both items
  const reasonItems=slots.filter(s=>s.kind!=='core'&&s.reasons.length);

  el.innerHTML=`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 14px;background:#06060e88;border:1px solid #ffffff11;border-radius:12px">
    <div style="width:40px;height:40px;border-radius:10px;overflow:hidden;background:#0a0a1a;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:1px solid #3b82f644">
      ${myHero.icon}
      ${hSrc(myHero.wn)?`<img src="${hSrc(myHero.wn)}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top" onerror="this.style.display='none'">`:''}
    </div>
    <div>
      <div style="font-size:.82rem;font-weight:800;color:#fff;font-family:'Oxanium',sans-serif">${myHero.name} — Counter Build</div>
      <div style="font-size:.65rem;color:#555;margin-top:2px">${counterCount} counter swap${counterCount!==1?'s':''} · ${bothCount} core+counter overlap</div>
    </div>
  </div>

  <div class="cb-grid">${slots.map((s,i)=>itemBox(s,i)).join('')}</div>

  <div style="display:flex;gap:10px;margin:14px 0 10px;font-size:.62rem;flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:3px;background:#ef444466;border:1px solid #ef4444;display:inline-block"></span><span style="color:#888">Counter swap</span></span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:3px;background:#f59e0b66;border:1px solid #f59e0b;display:inline-block"></span><span style="color:#888">Core + counter</span></span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:3px;background:#1a1a3a;border:1px solid #2a2a5a;display:inline-block"></span><span style="color:#888">Standard core</span></span>
  </div>

  ${reasonItems.length?`<div style="font-size:.68rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#f59e0b;margin:14px 0 8px;font-family:'Oxanium',sans-serif">Why these counter items?</div>
  ${reasonItems.map(item=>`<div class="crec" style="border-color:${item.kind==='counter'?'#ef444444':'#f59e0b44'}">
    <div class="crec-h">
      <div class="crecbox"><span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1">${item.e}</span>
        <img class="crecbox-img" src="${iSrc(item.n)}" alt="${item.n}" loading="lazy" onerror="iErr(this,'${item.n}',0)"></div>
      <span class="crecname">${item.n}</span>
      <span class="prio ${item.prio==='high'?'ph':'pm'}">${item.prio==='high'?'🔴 HIGH':'🟡 MED'}</span>
    </div>
    <div class="crecreason">${[...new Set(item.reasons)].join('<br>')}</div>
  </div>`).join('')}`:''}
  <div class="tip">💡 <b style="color:#ccc">Tip:</b> Buy items in order 1→6. Rush <span style="color:#f87171">counter items</span> earlier if the enemy threat is high.</div>`;
}

// ── INIT ──────────────────────────────────────────────────────────
renderRF();renderH();renderMyHeroSlot();renderSlots();renderMG();renderCR();

// ── PARTICLE CANVAS ───────────────────────────────────────────────
(function(){
  const cv=document.getElementById('bg-canvas');
  const cx=cv.getContext('2d');
  let W,H,stars=[];
  const N=120;
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize();window.addEventListener('resize',()=>{resize();init();});
  function rand(a,b){return a+Math.random()*(b-a);}
  function mkStar(){
    const hues=[270,45,190,0]; // purple, gold, cyan, red
    const h=hues[Math.floor(Math.random()*hues.length)];
    return{x:rand(0,W),y:rand(0,H),r:rand(.4,1.6),
      vx:rand(-.15,.15),vy:rand(-.08,.08),
      a:rand(.2,.8),da:rand(.003,.008)*( Math.random()>.5?1:-1),
      color:`hsla(${h},100%,80%,`};
  }
  function init(){stars=Array.from({length:N},mkStar);}
  init();
  function draw(){
    cx.clearRect(0,0,W,H);
    // grid overlay
    cx.strokeStyle='rgba(120,80,255,.04)';cx.lineWidth=1;
    const g=60;
    for(let x=0;x<W;x+=g){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=g){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    // stars
    stars.forEach(s=>{
      s.x+=s.vx;s.y+=s.vy;
      if(s.x<0)s.x=W;if(s.x>W)s.x=0;
      if(s.y<0)s.y=H;if(s.y>H)s.y=0;
      s.a+=s.da;
      if(s.a>0.85||s.a<0.1)s.da*=-1;
      cx.beginPath();
      cx.arc(s.x,s.y,s.r,0,Math.PI*2);
      cx.fillStyle=s.color+s.a+')';
      cx.fill();
    });
    // shooting star occasionally
    if(Math.random()<.003){
      const sx=rand(0,W),sy=rand(0,H*.5);
      const len=rand(80,160);
      const g2=cx.createLinearGradient(sx,sy,sx+len,sy+len*.3);
      g2.addColorStop(0,'rgba(255,220,100,0)');
      g2.addColorStop(.5,'rgba(255,220,100,.7)');
      g2.addColorStop(1,'rgba(255,220,100,0)');
      cx.strokeStyle=g2;cx.lineWidth=1.5;
      cx.beginPath();cx.moveTo(sx,sy);cx.lineTo(sx+len,sy+len*.3);cx.stroke();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
