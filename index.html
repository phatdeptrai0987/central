<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MLBB Builds & Counters</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080910;
      --panel: #10131d;
      --panel-2: #151a26;
      --line: #273044;
      --text: #f5f7fb;
      --muted: #98a3b7;
      --blue: #55c7ff;
      --green: #6ee7a8;
      --red: #ff6b6b;
      --gold: #ffd166;
      --violet: #b49cff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(85,199,255,.16), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(110,231,168,.12), transparent 34rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      width: min(1420px, 100%);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 300px 1fr 340px;
      gap: 14px;
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 2px 2px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2.35rem);
      line-height: 1.05;
    }

    .meta {
      color: var(--muted);
      font-size: .9rem;
      text-align: right;
    }

    .panel {
      background: color-mix(in srgb, var(--panel) 90%, transparent);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
      overflow: hidden;
      box-shadow: 0 14px 40px rgba(0,0,0,.22);
    }

    .panel-head {
      min-height: 54px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-title {
      margin: 0;
      font-size: .95rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #d9e3f5;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b0d14;
      color: var(--text);
      padding: 11px 12px;
      outline: none;
    }

    .search:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(85,199,255,.12); }

    .hero-list {
      height: calc(100vh - 168px);
      min-height: 520px;
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .hero-row {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: #0c0f17;
      color: var(--text);
      padding: 9px;
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      align-items: center;
      text-align: left;
    }

    .hero-row:hover, .hero-row.active { border-color: var(--blue); background: #111928; }
    .avatar {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(145deg, #18364b, #222530);
      font-size: 1.45rem;
      border: 1px solid #2e3a51;
      overflow: hidden;
      position: relative;
    }

    .name { font-weight: 800; line-height: 1.2; }
    .roles { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      border-radius: 999px;
      padding: 2px 7px;
      background: #1b2330;
      color: #c5d0e4;
      font-size: .7rem;
      font-weight: 700;
    }

    .main { display: grid; gap: 14px; min-width: 0; }
    .hero-stage {
      min-height: 206px;
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 380px);
      gap: 16px;
      align-items: stretch;
    }

    .selected-hero {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      align-items: center;
    }

    .big-avatar {
      width: 92px;
      aspect-ratio: 1;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 3.2rem;
      background: linear-gradient(145deg, #1a3a4f, #302c43);
      border: 1px solid #3b506d;
      overflow: hidden;
      position: relative;
    }

    .selected-hero h2 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 3rem);
      line-height: 1;
    }

    .subtitle { color: var(--muted); margin-top: 8px; line-height: 1.45; }

    .build-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      align-content: start;
    }

    .build-tab {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0c0f17;
      color: var(--text);
      padding: 12px;
      text-align: left;
      min-height: 84px;
    }

    .build-tab.active { border-color: var(--green); background: #102019; }
    .build-tab b { display: block; margin-bottom: 4px; }
    .build-tab span { color: var(--muted); font-size: .78rem; line-height: 1.25; display: block; }

    .build-panel {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .item {
      min-height: 132px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0d1018;
      padding: 9px;
      display: grid;
      gap: 7px;
      align-content: start;
      position: relative;
    }

    .item.counter { border-color: rgba(255,107,107,.75); box-shadow: inset 0 0 0 1px rgba(255,107,107,.16), 0 0 22px rgba(255,107,107,.08); }
    .item-art {
      width: 54px;
      aspect-ratio: 1;
      border-radius: 8px;
      background: linear-gradient(145deg, #192238, #0b0d14);
      border: 1px solid #2e3a51;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
      font-size: 1.75rem;
      line-height: 1;
    }
    .item-name { font-weight: 800; font-size: .82rem; line-height: 1.15; }
    .item-type { color: var(--muted); font-size: .72rem; line-height: 1.25; }
    .item-phase {
      width: fit-content;
      border-radius: 999px;
      background: rgba(85,199,255,.12);
      color: #aee6ff;
      padding: 2px 6px;
      font-size: .58rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .badge {
      position: absolute;
      top: 7px;
      right: 7px;
      border-radius: 999px;
      background: rgba(255,107,107,.18);
      color: #ffd3d3;
      padding: 2px 6px;
      font-size: .62rem;
      font-weight: 900;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .subpanel {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      min-width: 0;
    }

    .subpanel h3 {
      margin: 0 0 10px;
      font-size: .9rem;
      color: #e8eefb;
    }

    .stat {
      display: grid;
      grid-template-columns: 104px 1fr 34px;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: .78rem;
      color: #ccd5e5;
    }

    .bar {
      height: 9px;
      background: #0a0c12;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #252c3d;
    }

    .fill { height: 100%; width: var(--w); background: linear-gradient(90deg, var(--blue), var(--green)); }
    .notes { display: grid; gap: 8px; color: #d5deed; font-size: .9rem; line-height: 1.45; }
    .note { border-left: 3px solid var(--gold); padding-left: 10px; color: #dfe7f5; }

    .enemy-tools { padding: 12px; display: grid; gap: 10px; }
    .enemy-slots {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
    }

    .slot {
      min-height: 80px;
      border: 1px dashed #354058;
      border-radius: 8px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 6px;
      color: var(--muted);
      background: #0c0f17;
      position: relative;
    }

    .slot.filled { border-style: solid; color: var(--text); }
    .slot button {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border: 1px solid #46546f;
      border-radius: 999px;
      color: var(--text);
      background: #0a0c12;
      line-height: 1;
    }

    .enemy-list {
      max-height: calc(100vh - 308px);
      min-height: 390px;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .enemy-pick {
      min-height: 68px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0c0f17;
      color: var(--text);
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 8px;
      align-items: center;
      padding: 7px;
      text-align: left;
    }

    .enemy-pick:disabled { opacity: .35; cursor: not-allowed; }
    .mini-avatar {
      width: 34px;
      aspect-ratio: 1;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: #192132;
      font-size: 1.18rem;
      overflow: hidden;
      position: relative;
    }

    .asset-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .item-art .asset-img { object-fit: contain; padding: 4px; }
    .fallback-emoji { position: relative; z-index: 0; line-height: 1; }
    .asset-img.err { display: none; }

    .coach-strip {
      display: grid;
      grid-template-columns: 150px repeat(3, 1fr);
      gap: 8px;
    }

    .coach-card {
      min-height: 86px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0c0f17;
      padding: 10px;
      display: grid;
      align-content: center;
      gap: 4px;
      min-width: 0;
    }

    .coach-kicker {
      color: var(--muted);
      font-size: .68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .coach-value {
      font-size: 1.05rem;
      font-weight: 900;
      color: #eef5ff;
      line-height: 1.15;
    }

    .coach-small { color: var(--muted); font-size: .76rem; line-height: 1.28; }
    .score-ring {
      width: 70px;
      aspect-ratio: 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--green) calc(var(--score) * 1%), #202638 0);
      justify-self: center;
      position: relative;
      font-weight: 950;
      color: #ffffff;
    }

    .score-ring::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      background: #0c0f17;
    }

    .score-ring span { position: relative; z-index: 1; }
    .plan-list, .threat-list { display: grid; gap: 8px; }
    .plan-row, .threat-row {
      border-left: 3px solid var(--blue);
      padding-left: 10px;
      color: #dfe7f5;
      font-size: .88rem;
      line-height: 1.42;
    }

    .threat-row.high { border-color: var(--red); }
    .threat-row.med { border-color: var(--gold); }
    .threat-row.low { border-color: var(--green); }
    .rec-badge {
      display: inline-flex;
      width: fit-content;
      margin-top: 6px;
      border-radius: 999px;
      background: rgba(110,231,168,.14);
      color: #b8ffd6;
      padding: 3px 7px;
      font-size: .66rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .coach-action {
      width: fit-content;
      border: 1px solid rgba(110,231,168,.45);
      border-radius: 999px;
      background: rgba(110,231,168,.13);
      color: #d8ffe8;
      padding: 5px 10px;
      font-size: .72rem;
      font-weight: 900;
      margin-top: 4px;
    }

    .matchup-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .matchup-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(160deg, #101827, #0c0f17);
      padding: 12px;
      min-width: 0;
    }

    .matchup-card.danger { border-color: rgba(255,107,107,.55); }
    .matchup-card.good { border-color: rgba(110,231,168,.45); }
    .matchup-label {
      color: var(--muted);
      font-size: .68rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px;
    }

    .matchup-main {
      color: #f5f7fb;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.15;
    }

    .matchup-tip {
      color: #aab6cb;
      font-size: .78rem;
      line-height: 1.35;
      margin-top: 6px;
    }

    .score-ring.strong { background: conic-gradient(var(--green) calc(var(--score) * 1%), #202638 0); }
    .score-ring.stable { background: conic-gradient(var(--gold) calc(var(--score) * 1%), #202638 0); }
    .score-ring.risky { background: conic-gradient(var(--red) calc(var(--score) * 1%), #202638 0); }

    @media (max-width: 1150px) {
      .app { grid-template-columns: 280px 1fr; }
      .right { grid-column: 1 / -1; }
      .enemy-list { max-height: 360px; grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .coach-strip { grid-template-columns: repeat(2, 1fr); }
      .matchup-strip { grid-template-columns: 1fr; }
    }

    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; padding: 10px; }
      header { align-items: flex-start; flex-direction: column; }
      .meta { text-align: left; }
      .hero-list { height: 330px; min-height: 0; }
      .hero-stage { grid-template-columns: 1fr; }
      .build-tabs { grid-template-columns: 1fr; }
      .items { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .details-grid { grid-template-columns: 1fr; }
      .coach-strip { grid-template-columns: 1fr; }
      .matchup-strip { grid-template-columns: 1fr; }
      .enemy-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .enemy-slots { grid-template-columns: repeat(5, minmax(58px, 1fr)); overflow-x: auto; }
    }
  </style>
</head>

  <main class="app">
    <header>
      <div>
        <h1>MLBB Builds & Counters</h1>
        <div class="subtitle">Pick your hero, choose a build style, then add enemy heroes to see counter swaps and stats.</div>
      </div>
      <div class="meta" style="text-align:right">
        <div style="font-size:.75rem;color:var(--green);font-weight:700;letter-spacing:.04em">Patch 1.9.58 · Season 33</div>
        <div style="font-size:.7rem;color:var(--muted);margin-top:3px" id="lastUpdated"></div>
        <div id="summary" style="margin-top:4px;font-size:.85rem">0 enemies selected</div>
      </div>
    </header>

    <section class="panel">
      <div class="panel-head">
        <h2 class="panel-title">Your Hero</h2>
      </div>
      <div style="padding:10px 10px 0">
        <input id="heroSearch" class="search" placeholder="Search hero..." autocomplete="off" />
      </div>
      <div class="hero-list" id="heroList"></div>
    </section>

    <section class="main">
      <section class="panel hero-stage">
        <div class="selected-hero">
          <div class="big-avatar" id="bigAvatar">🏹</div>
          <div>
            <h2 id="heroName">Miya</h2>
            <div class="roles" id="heroRoles"></div>
            <div class="subtitle" id="heroDesc"></div>
          </div>
        </div>
        <div class="build-tabs" id="buildTabs"></div>
      </section>

      <section class="panel build-panel">
        <div class="panel-head" style="padding:0 0 12px; min-height:auto; border-bottom:0">
          <h2 class="panel-title" id="buildTitle">Build</h2>
          <span class="chip" id="buildFocus">Balanced</span>
        </div>
        <div class="coach-strip" id="coachStrip"></div>
        <div class="matchup-strip" id="matchupStrip"></div>
        <div class="items" id="items"></div>
        <div class="details-grid">
          <div class="subpanel">
            <h3>Build Stats</h3>
            <div id="stats"></div>
          </div>
          <div class="subpanel">
            <h3>What It Helps</h3>
            <div class="notes" id="notes"></div>
          </div>
          <div class="subpanel">
            <h3>MVP Game Plan</h3>
            <div class="plan-list" id="gamePlan"></div>
          </div>
          <div class="subpanel">
            <h3>Enemy Threats</h3>
            <div class="threat-list" id="threats"></div>
          </div>
        </div>
      </section>
    </section>

    <aside class="panel right">
      <div class="panel-head">
        <h2 class="panel-title">Enemy Team</h2>
        <button class="chip" id="clearEnemies" type="button">Clear</button>
      </div>
      <div class="enemy-tools">
        <div class="enemy-slots" id="enemySlots"></div>
        <input id="enemySearch" class="search" placeholder="Search enemy..." autocomplete="off" />
        <div class="enemy-list" id="enemyList"></div>
      </div>
    </aside>
  </main>

    function enemyPressure() {
      const pressure = {
        physical: 0, magic: 0, frontline: 0, sustain: 0, dive: 0, burst: 0,
        control: 0, attackSpeed: 0, healing: 0, pickoff: 0
      };
      for (const enemy of state.enemies) {
        if (enemy.roles.includes('Marksman')) { pressure.physical += 2; pressure.attackSpeed += 2; }
        if (enemy.roles.includes('Assassin')) { pressure.physical += 2; pressure.dive += 2; pressure.pickoff += 1; }
        if (enemy.roles.includes('Mage')) { pressure.magic += 2; pressure.burst += 1; }
        if (enemy.roles.includes('Fighter')) { pressure.physical += 1; pressure.frontline += 1; pressure.dive += 1; }
        if (enemy.roles.includes('Tank')) { pressure.frontline += 2; pressure.control += 1; }
        if (enemy.roles.includes('Support')) { pressure.sustain += 1; pressure.healing += 1; }
        if (THREAT_NAMES.sustain.includes(enemy.name)) { pressure.sustain += 2; pressure.healing += 2; }
        if (THREAT_NAMES.dive.includes(enemy.name)) pressure.dive += 2;
        if (THREAT_NAMES.burst.includes(enemy.name)) pressure.burst += 2;
        if (THREAT_NAMES.control.includes(enemy.name)) pressure.control += 2;
        if (THREAT_NAMES.shred.includes(enemy.name)) pressure.attackSpeed += 2;
      }
      return pressure;
    }

    function recommendedStyle(hero, pressure) {
      const role = primaryRole(hero);
      const danger = pressure.dive + pressure.burst + pressure.control;
      if (danger >= 4 || (role === 'Marksman' && pressure.dive >= 2)) return 'armor';
      if (['Marksman','Assassin','Mage','Fighter'].includes(role) && pressure.frontline >= 3) return 'damage';
      if ((role === 'Tank' || role === 'Support') && pressure.attackSpeed + pressure.healing >= 4) return 'armor';
      return 'balanced';
    }

    function styleScore(stats, pressure, hero, build) {
      const role = primaryRole(hero);
      let score = 58;
      if (['Marksman','Assassin','Fighter'].includes(role)) score += Math.min(18, (stats.physicalDamage + stats.penetration) / 7);
      if (role === 'Mage') score += Math.min(18, (stats.magicDamage + stats.penetration) / 7);
      if (role === 'Tank' || role === 'Support') score += Math.min(20, (stats.armor + stats.magicDefense + stats.sustain + stats.utility) / 12);
      if (pressure.physical > pressure.magic) score += Math.min(10, stats.armor / 12);
      if (pressure.magic > pressure.physical) score += Math.min(10, stats.magicDefense / 12);
      if (pressure.healing >= 2 && build.some(i => ['Sea Halberd','Necklace of Durance','Dominance Ice'].includes(i.name))) score += 8;
      if (pressure.dive >= 2 && build.some(i => ['Wind of Nature','Winter Crown','Immortality','Antique Cuirass'].includes(i.name))) score += 8;
      return Math.max(0, Math.min(99, Math.round(score)));
    }

      const physicalMap = {

        'Radiant Armor': 'Rose Gold Meteor',
        'Blade Armor': 'Wind of Nature',

      };
      if (heroRole === 'Mage') return mageMap[itemName] || itemName;
      if (heroRole === 'Tank') return tankMap[itemName] || itemName;
      if (heroRole === 'Support') return supportMap[itemName] || itemName;
      if (['Marksman','Assassin','Fighter'].includes(heroRole)) return physicalMap[itemName] || itemName;
      return itemName;
    }

    function counterItems(hero) {
      const found = new Map();
      const heroRole = primaryRole(hero);
      for (const enemy of state.enemies) {
        for (const rule of COUNTER_RULES) {
          const nameMatch = rule.names && rule.names.includes(enemy.name);
          const roleMatch = rule.roles && enemy.roles.some(r => rule.roles.includes(r));
          if (nameMatch || roleMatch) {
            const targetItem = roleCounterItem(rule.item, heroRole);
            const existing = found.get(targetItem) || { score: 0, reasons: [] };
            existing.score += nameMatch ? 4 : 2;
            existing.reasons.push(`${enemy.name}: ${rule.reason}`);
            found.set(targetItem, existing);
          }
        }
      }
      return [...found.entries()].map(([name, data]) => {
        const built = item(name, data.reasons.join('; '));
        return { ...built, score: data.score };
      }).filter(ci => {
        if (heroRole === 'Mage') return !['Blade Armor','Wind of Nature','Sea Halberd','Malefic Roar','Dominance Ice'].includes(ci.name);
        if (heroRole === 'Tank' || heroRole === 'Support') return !['Malefic Roar','Berserker’s Fury'].includes(ci.name);
        return ci.name !== 'Necklace of Durance';
      }).sort((a,b) => b.score - a.score).slice(0, 2);
    }

    function activeBuild() {
      const build = baseBuild(state.hero, state.style);
      const counters = counterItems(state.hero);
      const inserts = [];
      counters.forEach(counter => {
        const existing = build.find(item => item.name === counter.name);
        if (existing) {
          existing.isCounter = true;
          existing.counterReason = counter.counterReason;
          return;
        }
        inserts.push(counter);
      });
      inserts.forEach((counter, idx) => {
        const replaceAt = build.length - 1 - idx;
        build[replaceAt] = { ...counter, isCounter: true };
      });
      return build;
    }

    function sumStats(build) {
      const totals = { physicalDamage:0, magicDamage:0, armor:0, magicDefense:0, sustain:0, attackSpeed:0, penetration:0, utility:0 };
      build.forEach(it => Object.entries(it.stats).forEach(([key, val]) => totals[key] += val));
      return totals;
    }

    function threatSummary(pressure) {
      const rows = [
        ['Physical DPS', pressure.physical + pressure.attackSpeed],
        ['Burst', pressure.burst],
        ['Dive', pressure.dive],
        ['Crowd Control', pressure.control],
        ['Healing', pressure.healing],
        ['Frontline', pressure.frontline]
      ].sort((a,b) => b[1] - a[1]);
      return rows[0][1] > 0 ? rows[0] : ['No enemies picked', 0];
    }

    function advantageTier(score) {
      if (score >= 82) return { label: 'Strong Advantage', className: 'strong', tip: 'Your build matches the draft well. Play around objectives and item spikes.' };
      if (score >= 68) return { label: 'Stable Matchup', className: 'stable', tip: 'Playable draft. Follow the recommended build style if enemies get fed.' };
      return { label: 'Risky Draft', className: 'risky', tip: 'Respect enemy burst/CC. Farm safely and use the recommended defensive style.' };
    }

    function nextItemTip(build) {
      const counter = build.find(item => item.isCounter);
      if (counter) return `${counter.name} is your priority counter. Buy it earlier if that enemy is fed.`;
      const core = build[2] || build[1] || build[0];
      return `${core.name} is your main power spike. Avoid forced fights before it is online.`;
    }

    function itemPhase(item, idx) {
      if (item.isCounter) return 'Counter';
      if (idx < 2) return 'Early';
      if (idx < 4) return 'Core';
      return 'Late';
    }

    function renderHeroList() {
      const q = $('heroSearch').value.trim().toLowerCase();
      $('heroList').innerHTML = HEROES
        .filter(h => h.name.toLowerCase().includes(q) || h.roles.join(' ').toLowerCase().includes(q))
        .map(h => `<button class="hero-row ${h.name === state.hero.name ? 'active' : ''}" type="button" onclick="pickHero('${h.name.replace(/'/g,"\\'")}')">
          ${imageFrame('avatar', heroImg(h), h.name, h.icon)}
          <span><span class="name">${h.name}</span><span class="roles">${h.roles.map(role => `<span class="chip">${role}</span>`).join('')}</span></span>
        </button>`).join('');
    }

    function renderEnemyList() {
      const q = $('enemySearch').value.trim().toLowerCase();
      $('enemyList').innerHTML = HEROES
        .filter(h => h.name.toLowerCase().includes(q) || h.roles.join(' ').toLowerCase().includes(q))
        .map(h => {
          const picked = state.enemies.some(e => e.name === h.name);
          const disabled = picked || state.enemies.length >= 5;
          return `<button class="enemy-pick" type="button" ${disabled ? 'disabled' : ''} onclick="addEnemy('${h.name.replace(/'/g,"\\'")}')">
            ${imageFrame('mini-avatar', heroImg(h), h.name, h.icon)}
            <span><span class="name">${h.name}</span><span class="roles">${h.roles.slice(0,2).map(role => `<span class="chip">${role}</span>`).join('')}</span></span>
          </button>`;
        }).join('');
    }

    function renderEnemySlots() {
      $('enemySlots').innerHTML = [0,1,2,3,4].map(i => {
        const h = state.enemies[i];
        if (!h) return `<div class="slot">Slot ${i + 1}</div>`;
        return `<div class="slot filled"><button type="button" onclick="removeEnemy('${h.name.replace(/'/g,"\\'")}')">×</button><div>${imageFrame('mini-avatar', heroImg(h), h.name, h.icon)}<b>${h.name}</b></div></div>`;
      }).join('');
      $('summary').textContent = `${state.enemies.length} ${state.enemies.length === 1 ? 'enemy' : 'enemies'} selected`;
    }

    function renderBuildTabs() {
      const rec = recommendedStyle(state.hero, enemyPressure());
      $('buildTabs').innerHTML = Object.entries(BUILD_LABELS).map(([key, [label, desc]]) => `
        <button class="build-tab ${state.style === key ? 'active' : ''}" type="button" onclick="setStyle('${key}')">
          <b>${label}</b><span>${desc}</span>${rec === key ? '<span class="rec-badge">Recommended</span>' : ''}
        </button>`).join('');
    }

    function renderSelectedHero() {
      const role = primaryRole(state.hero);
      $('bigAvatar').innerHTML = `<span class="fallback-emoji">${state.hero.icon}</span><img class="asset-img" src="${heroImg(state.hero)}" alt="${state.hero.name}" onerror="this.classList.add('err')">`;
      $('heroName').textContent = state.hero.name;
      $('heroRoles').innerHTML = state.hero.roles.map(r => `<span class="chip">${r}</span>`).join('');
      $('heroDesc').textContent = `${state.hero.name} is using a ${BUILD_LABELS[state.style][0].toLowerCase()} ${role.toLowerCase()} setup. Counter items replace the final slots when enemies demand it.`;
    }

    function renderItems(build) {
      $('items').innerHTML = build.map((it, idx) => `
        <div class="item ${it.isCounter ? 'counter' : ''}">
          ${it.isCounter ? '<span class="badge">COUNTER</span>' : ''}
          ${imageFrame('item-art', itemImg(it.name), it.name, it.icon)}
          <div class="item-phase">${itemPhase(it, idx)}</div>
          <div class="item-name">${idx + 1}. ${it.name}</div>
          <div class="item-type">${it.type}</div>
        </div>`).join('');
    }

    function renderStats(stats) {
      const labels = [
        ['physicalDamage','Physical'], ['magicDamage','Magic'], ['armor','Armor'], ['magicDefense','Magic Def'],
        ['sustain','HP/Sustain'], ['attackSpeed','Atk Speed'], ['penetration','Penetration'], ['utility','Utility']
      ];
      $('stats').innerHTML = labels.map(([key, label]) => {
        const value = Math.min(100, stats[key]);
        return `<div class="stat"><span>${label}</span><span class="bar"><span class="fill" style="--w:${value}%"></span></span><b>${value}</b></div>`;
      }).join('');
    }

    function renderCoach(build, stats, pressure) {
      const role = primaryRole(state.hero);
      const guide = ROLE_GUIDE[role] || ROLE_GUIDE.Fighter;
      const rec = recommendedStyle(state.hero, pressure);
      const score = styleScore(stats, pressure, state.hero, build);
      const tier = advantageTier(score);
      const recText = rec === state.style ? 'You are on the best style for this draft.' : `Switch to ${BUILD_LABELS[rec][0]} for this enemy draft.`;
      const recAction = rec === state.style ? '' : `<button class="coach-action" type="button" onclick="setStyle('${rec}')">Use ${BUILD_LABELS[rec][0]}</button>`;
      const damageType = stats.magicDamage > stats.physicalDamage ? 'magic burst' : stats.attackSpeed > stats.physicalDamage ? 'basic attacks' : 'physical damage';
      $('coachStrip').innerHTML = `
        <div class="coach-card">
          <div class="score-ring ${tier.className}" style="--score:${score}"><span>${score}</span></div>
          <div class="coach-small" style="text-align:center">${tier.label}</div>
        </div>
        <div class="coach-card"><div class="coach-kicker">Best Move</div><div class="coach-value">${recText}</div>${recAction}<div class="coach-small">Updates when you add enemies.</div></div>
        <div class="coach-card"><div class="coach-kicker">Spell</div><div class="coach-value">${guide.spell}</div><div class="coach-small">Use Purify over greed if enemy CC is high.</div></div>
        <div class="coach-card"><div class="coach-kicker">Win Condition</div><div class="coach-value">${damageType}</div><div class="coach-small">${guide.lane}</div></div>`;
    }

    function renderMatchup(build, stats, pressure) {
      const score = styleScore(stats, pressure, state.hero, build);
      const tier = advantageTier(score);
      const [threat, threatValue] = threatSummary(pressure);
      const counterCount = build.filter(item => item.isCounter).length;
      const threatText = threatValue >= 4 ? `${threat} is high` : threatValue >= 2 ? `${threat} is medium` : threat;
      const counterText = counterCount ? `${counterCount} counter ${counterCount === 1 ? 'slot' : 'slots'} active` : 'Core build active';
      $('matchupStrip').innerHTML = `
        <div class="matchup-card ${tier.className === 'risky' ? 'danger' : 'good'}">
          <div class="matchup-label">Draft Read</div>
          <div class="matchup-main">${tier.label}</div>
          <div class="matchup-tip">${tier.tip}</div>
        </div>
        <div class="matchup-card ${threatValue >= 4 ? 'danger' : ''}">
          <div class="matchup-label">Main Threat</div>
          <div class="matchup-main">${threatText}</div>
          <div class="matchup-tip">${threatValue ? 'Your item swaps and spell choice should answer this first.' : 'Pick enemy heroes to unlock draft-specific advice.'}</div>
        </div>
        <div class="matchup-card">
          <div class="matchup-label">Next Buy</div>
          <div class="matchup-main">${counterText}</div>
          <div class="matchup-tip">${nextItemTip(build)}</div>
        </div>`;
    }

    function renderGamePlan(pressure) {
      const role = primaryRole(state.hero);
      const guide = ROLE_GUIDE[role] || ROLE_GUIDE.Fighter;
      const draftTip = pressure.control >= 3
        ? 'Enemy has heavy CC: wait for key stuns/hooks before committing.'
        : pressure.dive >= 3
          ? 'Enemy can dive: keep one escape tool and play close to vision.'
          : pressure.healing >= 2
            ? 'Enemy sustain is high: force anti-heal early and do not take slow losing fights.'
            : 'Draft is playable: farm cleanly, fight around item spikes, and avoid random river deaths.';
      $('gamePlan').innerHTML = [
        `<b>Emblem:</b> ${guide.emblem}`,
        `<b>Early:</b> ${guide.early}`,
        `<b>Mid:</b> ${guide.mid}`,
        `<b>Late:</b> ${guide.late}`,
        `<b>Draft read:</b> ${draftTip}`
      ].map(row => `<div class="plan-row">${row}</div>`).join('');
    }

    function renderThreats(pressure) {
      const rows = [
        ['Burst', pressure.burst, 'Buy magic/physical safety before greed items.'],
        ['Physical DPS', pressure.physical + pressure.attackSpeed, 'Respect basic-attack carries. Use armor, attack-speed slow, or physical immunity.'],
        ['Dive', pressure.dive, 'Stay near peel and hold escape until assassins show.'],
        ['Crowd Control', pressure.control, 'Purify/Flicker value is high. Do not face-check bushes.'],
        ['Healing', pressure.healing, 'Anti-heal is mandatory if this reaches medium or high.'],
        ['Frontline', pressure.frontline, 'Penetration and objective control matter more than chasing.']
      ].filter(row => row[1] > 0);
      if (!rows.length) {
        $('threats').innerHTML = '<div class="threat-row low">Pick enemies to get draft-specific threats and counter priorities.</div>';
        return;
      }
      $('threats').innerHTML = rows.sort((a,b) => b[1] - a[1]).map(([label, value, tip]) => {
        const level = value >= 4 ? 'high' : value >= 2 ? 'med' : 'low';
        const text = value >= 4 ? 'High' : value >= 2 ? 'Medium' : 'Low';
        return `<div class="threat-row ${level}"><b>${label}: ${text}</b><br>${tip}</div>`;
      }).join('');
    }

    function renderNotes(build, stats) {
      const topStats = Object.entries(stats).sort((a,b) => b[1] - a[1]).slice(0, 3).map(([key]) => key);
      const readable = {
        physicalDamage:'physical damage', magicDamage:'magic damage', armor:'armor', magicDefense:'magic defense',
        sustain:'HP and sustain', attackSpeed:'attack speed', penetration:'penetration', utility:'utility'
      };
      const counterNotes = build.filter(i => i.isCounter).map(i => `${i.name} helps because ${i.counterReason}.`);
      const styleNote = {
        balanced: 'Use this when the match is normal and you still need room for enemy-counter swaps.',
        damage: 'Use this when your team needs you to carry fights, burst targets, or end faster.',
        armor: 'Use this when enemies are diving you, bursting you, or forcing long fights.'
      }[state.style];
      const rec = recommendedStyle(state.hero, enemyPressure());
      const recNote = rec === state.style
        ? 'This style fits the current enemy draft.'
        : `Recommended adjustment: switch to ${BUILD_LABELS[rec][0]} before the next fight.`;
      $('notes').innerHTML = [
        `${BUILD_LABELS[state.style][0]} build leans into ${topStats.map(k => readable[k]).join(', ')}.`,
        styleNote,
        recNote,
        ...counterNotes
      ].map(note => `<div class="note">${note}</div>`).join('');
    }

    function render() {
      const build = activeBuild();
      const stats = sumStats(build);
      const pressure = enemyPressure();
      $('buildTitle').textContent = `${state.hero.name} ${BUILD_LABELS[state.style][0]} Build`;
      $('buildFocus').textContent = primaryRole(state.hero);
      renderHeroList();
      renderEnemySlots();
      renderEnemyList();
      renderBuildTabs();
      renderSelectedHero();
      renderItems(build);
      renderStats(stats);
      renderCoach(build, stats, pressure);

      // Show last-updated date
      const lu = $('lastUpdated');
      if (lu) lu.textContent = 'Updated ' + new Date('2026-06-30').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      renderMatchup(build, stats, pressure);
      renderGamePlan(pressure);
      renderThreats(pressure);
      renderNotes(build, stats);
    }

    function pickHero(name) { state.hero = HEROES.find(h => h.name === name); render(); }
    function setStyle(style) { state.style = style; render(); }
    function addEnemy(name) {
      if (state.enemies.length >= 5 || state.enemies.some(h => h.name === name)) return;
      state.enemies.push(HEROES.find(h => h.name === name));
      render();
    }
    function removeEnemy(name) { state.enemies = state.enemies.filter(h => h.name !== name); render(); }

    $('heroSearch').addEventListener('input', renderHeroList);
    $('enemySearch').addEventListener('input', renderEnemyList);
    $('clearEnemies').addEventListener('click', () => { state.enemies = []; render(); });
    render();
  </script>
</body>
</html>
