<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MLBB Builds & Counters</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07071a;color:#e0e0ff;font-family:'Segoe UI',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#12122a}::-webkit-scrollbar-thumb{background:#4a4aff;border-radius:3px}
header{background:linear-gradient(135deg,#0f0f2e,#1a1a4a,#0f3060);padding:16px 28px;border-bottom:2px solid #3a3aff;display:flex;align-items:center;gap:14px}
.hlogo{width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,#4a4aff,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.5rem;box-shadow:0 0 18px #4a4aff88;flex-shrink:0}
header h1{font-size:1.5rem;font-weight:900;background:linear-gradient(90deg,#6a6aff,#c084fc,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:#7777bb;font-size:.8rem;margin-top:3px}
.tabs{display:flex;gap:4px;padding:12px 24px 0;background:#0e0e28;border-bottom:1px solid #1e1e4a}
.tab{padding:8px 20px;border-radius:8px 8px 0 0;cursor:pointer;font-weight:700;font-size:.85rem;border:none;transition:all .2s}
.tab.active{background:linear-gradient(135deg,#3a3aff,#6a4aff);color:#fff}
.tab:not(.active){background:#12122a;color:#6666aa}
.tab:not(.active):hover{background:#1a1a3a;color:#bbb}
.content{padding:20px;max-width:1440px;margin:0 auto}
.page{display:none}.page.active{display:block}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;padding:9px 16px;border-radius:8px;border:1px solid #1e1e4a;background:#12122a;color:#e0e0ff;font-size:.9rem;outline:none}
.search-box:focus{border-color:#4a4aff}
.role-btn{padding:5px 13px;border-radius:20px;border:1px solid #1e1e4a;background:#12122a;color:#7777aa;cursor:pointer;font-size:.76rem;font-weight:600;transition:all .2s}
.role-btn.active{background:linear-gradient(135deg,#3a3aff,#6a4aff);color:#fff;border-color:transparent}
.role-btn:hover:not(.active){border-color:#4a4aff;color:#ccc}
.hcount{color:#444;font-size:.75rem;margin-left:auto}

/* ── HERO GRID ── */
.hero-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(106px,1fr));gap:10px}
.hero-card{border-radius:11px;cursor:pointer;transition:all .2s;overflow:hidden;border:1px solid #1e1e4a;background:#0f0f28}
.hero-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(74,74,255,.35);border-color:#4a4aff}

/* ── PORTRAIT (CRITICAL: emoji z:1, img z:2, decorations z:3+) ── */
.portrait{width:100%;aspect-ratio:1;position:relative;overflow:hidden}
.p-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;z-index:1;pointer-events:none}
.p-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;z-index:2}
.p-img.err{display:none}
.p-grad{position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(transparent,rgba(0,0,10,.8));z-index:3;pointer-events:none}
.p-pip{position:absolute;top:5px;right:5px;padding:2px 6px;border-radius:5px;font-size:.54rem;font-weight:800;z-index:4;letter-spacing:.5px}
.hero-info{padding:6px 7px 8px}
.hero-name{font-size:.7rem;font-weight:700;color:#dde;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-role-tag{font-size:.59rem;color:#5566aa;margin-top:1px}

/* ── MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,15,.9);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px;backdrop-filter:blur(6px)}
.moverlay.hidden{display:none}
.modal{background:#0c0c22;border:1px solid #2a2a5a;border-radius:16px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 24px 80px #000c}
.mclose{position:absolute;top:12px;right:12px;background:#1a1a3a;border:1px solid #2a2a5a;color:#aaa;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;z-index:10}
.mclose:hover{background:#ff3a3a22;color:#ff6666}
.mbanner{position:relative;height:170px;overflow:hidden;border-radius:16px 16px 0 0}
/* Banner also needs emoji underneath, img on top */
.mb-emoji{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:6rem;filter:drop-shadow(0 4px 20px #000c);z-index:1}
.mb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;z-index:2}
.mb-img.err{display:none}
.mb-grad{position:absolute;inset:0;z-index:3;pointer-events:none}
.mb-info{position:absolute;bottom:0;left:0;padding:14px 18px;z-index:4}
.mb-name{font-size:1.5rem;font-weight:900;text-shadow:0 2px 12px #000c}
.mb-roles{display:flex;gap:4px;margin-top:4px}
.rbadge{display:inline-block;padding:2px 9px;border-radius:9px;font-size:.63rem;font-weight:700}
.mbody{padding:18px}
.stitle{font-size:.76rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:currentColor;opacity:.2}

/* ── ITEM CARDS (same z-index pattern) ── */
.build-grid{display:flex;gap:8px;flex-wrap:wrap}
.icard{width:80px;border-radius:9px;overflow:hidden;flex-shrink:0;border:1px solid #1e1e4a;background:#0d0d22;cursor:default;transition:transform .15s}
.icard:hover{transform:scale(1.08)}
.ip{width:80px;height:80px;position:relative;overflow:hidden;background:#12122a;display:flex;align-items:center;justify-content:center}
.ip-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;z-index:1}
.ip-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}
.ip-img.err{display:none}
.ilabel{padding:4px 3px 5px;text-align:center;background:#0d0d22}
.iname{font-size:.58rem;color:#bbc;line-height:1.2;font-weight:600}
.itype{font-size:.5rem;color:#4a6aff;margin-top:1px}

/* ── MATCHUPS & COUNTERS ── */
.ccols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.clist{background:#0d0d22;border:1px solid #1a1a3a;border-radius:10px;padding:12px}
.clist h4{font-size:.74rem;font-weight:700;margin-bottom:8px}
.ctag{display:inline-block;background:#12122a;border:1px solid #1e1e4a;border-radius:5px;padding:3px 8px;font-size:.69rem;margin:2px;color:#ccc}
.cirow{display:flex;align-items:center;gap:10px;background:#0d0d22;border:1px solid #1a1a3a;border-radius:9px;padding:9px 12px;margin:5px 0}
.cibox{width:42px;height:42px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#12122a;position:relative;display:flex;align-items:center;justify-content:center}
.cibox-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;z-index:1}
.cibox-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}
.cibox-img.err{display:none}
.ciname{font-weight:700;font-size:.8rem;color:#4aff88}
.ciwhy{font-size:.68rem;color:#7799aa;margin-top:2px;line-height:1.3}

/* ── COUNTER TOOL ── */
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:#0f0f28;border:1px solid #1e1e4a;border-radius:13px;padding:16px;margin-bottom:14px}
.panel h3{font-size:.9rem;font-weight:800;margin-bottom:12px}
.eslot{display:flex;align-items:center;gap:10px;background:#0a0a1e;border:1px dashed #2a2a4a;border-radius:8px;padding:8px 12px;margin-bottom:7px}
.eslot.filled{border-style:solid;border-color:#ff3a3a44;background:#180a0a}
.sthumb{width:32px;height:32px;border-radius:7px;overflow:hidden;flex-shrink:0;background:#12122a;position:relative;display:flex;align-items:center;justify-content:center;font-size:1rem}
.sthumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;z-index:2}
.sthumb-img.err{display:none}
.sthumb-e{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1}
.sname{flex:1;font-size:.8rem;font-weight:600;color:#ccc}
.rbtn{background:none;border:none;color:#ff5555;cursor:pointer;font-size:.85rem;opacity:.7}
.rbtn:hover{opacity:1}
.minigrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:7px;max-height:320px;overflow-y:auto;padding:2px}
.minicard{border-radius:9px;cursor:pointer;transition:all .15s;overflow:hidden;border:1px solid #1e1e4a;background:#0f0f28}
.minicard:hover:not(.dis){transform:scale(1.05);border-color:#ff4a4a}
.minicard.dis{opacity:.3;pointer-events:none}
.mthumb{width:100%;aspect-ratio:1;position:relative;overflow:hidden;background:#12122a;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.mthumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;z-index:2}
.mthumb-img.err{display:none}
.mthumb-e{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1}
.mname{padding:3px;text-align:center;font-size:.57rem;color:#aaa;font-weight:600;background:#0d0d22;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crec{background:#091509;border:1px solid #2a4a2a;border-radius:9px;padding:11px 13px;margin-bottom:9px}
.crec-h{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.crecbox{width:36px;height:36px;border-radius:7px;overflow:hidden;flex-shrink:0;background:#12122a;position:relative;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.crecbox-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}
.crecbox-img.err{display:none}
.crecname{font-weight:800;font-size:.85rem;color:#4aff88;flex:1}
.prio{font-size:.6rem;padding:2px 7px;border-radius:9px;font-weight:800}
.ph{background:#ff3a3a22;color:#ff6666;border:1px solid #ff3a3a55}
.pm{background:#ff880022;color:#ffaa44;border:1px solid #ff880055}
.crecreason{font-size:.7rem;color:#7a9a7a;line-height:1.4}
.empty{text-align:center;padding:32px 16px;color:#444}
.tip{margin-top:12px;padding:10px;background:#0a0a20;border:1px solid #1a1a3a;border-radius:8px;font-size:.7rem;color:#7777aa;line-height:1.5}
@media(max-width:660px){.twocol,.ccols{grid-template-columns:1fr}.hero-grid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr))}}
</style>
</head>
<body>
<header>
  <div class="hlogo">⚔️</div>
  <div><h1>MLBB Builds &amp; Counters</h1><p>Latest meta builds · Hero matchups · Enemy team counter items</p></div>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('builds')">🗡️ Hero Builds</button>
  <button class="tab" onclick="switchTab('counter')">🛡️ Counter Tool</button>
</div>
<div class="content">
  <div id="page-builds" class="page active">
    <div class="filters">
      <input class="search-box" id="hs" placeholder="🔍 Search hero..." oninput="renderH()"/>
      <div id="rf" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <span class="hcount" id="hc"></span>
    </div>
    <div class="hero-grid" id="hg"></div>
  </div>
  <div id="page-counter" class="page">
    <div class="twocol">
      <div>
        <div class="panel">
          <h3 style="color:#ff6666">🔴 Enemy Team <span style="font-size:.7rem;color:#333;font-weight:400">(pick up to 5)</span></h3>
          <div id="eslots"></div>
        </div>
        <div class="panel">
          <h3 style="color:#999;font-size:.85rem">Pick Enemy Heroes</h3>
          <input class="search-box" id="es" placeholder="🔍 Search..." oninput="renderMG()" style="width:100%;margin-bottom:10px"/>
          <div class="minigrid" id="mg"></div>
        </div>
      </div>
      <div class="panel"><h3 style="color:#4aff88">🟢 Recommended Counter Items</h3><div id="cr"></div></div>
    </div>
  </div>
</div>
<div class="moverlay hidden" id="mo" onclick="closeOut(event)">
  <div class="modal" id="mb"><button class="mclose" onclick="closeM()">✕</button><div id="mc"></div></div>
</div>

function hSrc(wn) {
  if (!HIMGS[wn]) return null;
  const safe = wn.replace(/ /g,'_').replace(/'/g,'').replace(/\./g,'');
  return 'mlbb-assets/heroes/' + safe + '.webp';
}
function hSrc2(wn) { return null; }

// Item icon — local files first, emoji fallback if missing
function iSrc(name) {
  const safe = name.replace(/ /g,'_').replace(/'/g,'').replace(/\//g,'');

    [i('Tough Boots','👟','Boots'),i('Oracle','🔮','Regen'),i('Fleeting Time','⏱️','CDR Ult'),i('Necklace of Durance','📿','Anti-Heal'),i('Immortality','💀','Revive'),i("Athena's Shield",'🔵','Mag.Def')],
    ['Layla','Miya','Claude','Aldous'],['Helcurt','Gusion','Lancelot','Chou'],
    [{e:'⚡',n:'Necklace of Durance',w:'#1 item against Estes — cuts healing 50%'},{e:'🗡️',n:'Sea Halberd',w:"Reduces his and his allies' lifesteal and regen on hit"}]),
  H('diggie','Diggie',['Support'],'⏰','Diggie',
    [i('Tough Boots','👟','Boots'),i('Oracle','🔮','Regen'),i('Necklace of Durance','📿','Anti-Heal'),i('Fleeting Time','⏱️','CDR Ult'),i('Immortality','💀','Revive'),i("Athena's Shield",'🔵','Mag.Def')],
    ['Franco','Khufra','Atlas','Tigreal'],['Gusion','Helcurt','Lancelot'],
    [{e:'🔵',n:"Athena's Shield",w:'Tank his Reverse Time egg bomb damage'},{e:'🌑',n:'Radiant Armor',w:'Reduces his magic bomb spam damage'}]),
  H('angela','Angela',['Support'],'❤️','Angela',
    [i('Tough Boots','👟','Boots'),i('Oracle','🔮','Regen'),i('Fleeting Time','⏱️','CDR Ult'),i('Necklace of Durance','📿','Anti-Heal'),i('Immortality','💀','Revive'),i("Athena's Shield",'🔵','Mag.Def')],
    ['Layla','Miya','Claude','Aldous'],['Helcurt','Gusion','Chou'],
    [{e:'⚡',n:'Necklace of Durance',w:'Counters her massive shield and Attached Soul heal'},{e:'🗡️',n:'Sea Halberd',w:"Reduces both her healing and the ally she's attached to"}]),
  H('kaja','Kaja',['Support','Fighter'],'⚡','Kaja',
    [i('Tough Boots','👟','Boots'),i('Oracle','🔮','Regen'),i('Fleeting Time','⏱️','CDR Ult'),i('Necklace of Durance','📿','Anti-Heal'),i('Immortality','💀','Revive'),i('Dominance Ice','❄️','Anti-Heal')],
    ['Aldous','Fanny','Lancelot','Ling'],['Diggie','Gusion','Lancelot'],
    [{e:'🕊️',n:'Purify (Spell)',w:"Removes his Ring of Order ult kidnap suppress"},{e:'💨',n:'Wind of Nature',w:'Physical immune during his ult drag'}]),
  H('floryn','Floryn',['Support'],'🌸','Floryn',null,['Layla','Miya','Claude'],['Helcurt','Gusion','Lancelot'],null),
  H('mathilda','Mathilda',['Support','Assassin'],'🦋','Mathilda',null,['Layla','Miya','Claude'],['Helcurt','Gusion','Chou'],null),
  H('faramis','Faramis',['Support'],'💀','Faramis',null,['Layla','Miya','Claude'],['Helcurt','Gusion','Lancelot'],null),
];

// Deduplicate by name
const seen=new Set();
const heroList=heroes.filter(h=>{ if(seen.has(h.name))return false; seen.add(h.name); return true; });

// ── STATE ─────────────────────────────────────────────────────────
let roleFilter='All',enemyTeam=[];
const ROLES=['All','Tank','Fighter','Assassin','Mage','Marksman','Support'];

// ── TAB ───────────────────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['builds','counter'][i]===t));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
}

// ── FILTERS ───────────────────────────────────────────────────────
function renderRF(){
  document.getElementById('rf').innerHTML=ROLES.map(r=>
    `<button class="role-btn${r===roleFilter?' active':''}" onclick="setRole('${r}')">${r}</button>`
  ).join('');
}
function setRole(r){roleFilter=r;renderRF();renderH();}

// ── HERO GRID ─────────────────────────────────────────────────────
function renderH(){
  const q=document.getElementById('hs').value.toLowerCase();
  const list=heroList.filter(h=>h.name.toLowerCase().includes(q)&&(roleFilter==='All'||h.roles.includes(roleFilter)));
  document.getElementById('hc').textContent=`${list.length} heroes`;
  document.getElementById('hg').innerHTML=list.map(h=>{
    const s=rs(h);
    return `<div class="hero-card" onclick="openM('${h.name.replace(/'/g,"\\'")}')">
      <div class="portrait" style="background:${s.grad}">
        <div class="p-emoji">${h.icon}</div>
        ${hSrc(h.wn)?`<img class="p-img" src="${hSrc(h.wn)}" alt="${h.name}" loading="lazy" onerror="hErr(this,'${h.wn.replace(/'/g,"\\'")}')">`:''}
        <div class="p-grad"></div>
        <div class="p-pip" style="background:${s.pipbg};color:${s.pip}">${s.lbl}</div>
      </div>
      <div class="hero-info">
        <div class="hero-name">${h.name}</div>
        <div class="hero-role-tag">${h.roles.join(' · ')}</div>
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────
function openM(name){
  const h=heroList.find(x=>x.name===name);
  if(!h)return;
  const s=rs(h);
  const buildHtml=h.build.map(item=>`
    <div class="icard" title="${item.n}">
      <div class="ip">
        <div class="ip-emoji">${item.e}</div>
        <img class="ip-img" src="${iSrc(item.n)}" alt="${item.n}" loading="lazy" onerror="iErr(this,'${item.n}',0)">
      </div>
      <div class="ilabel">
        <div class="iname">${item.n}</div>
        <div class="itype">${item.t}</div>
      </div>
    </div>`).join('');
  const ciHtml=h.ci.map(ci=>`
    <div class="cirow">
      <div class="cibox">
        <div class="cibox-emoji">${ci.e}</div>
        <img class="cibox-img" src="${iSrc(ci.n)}" alt="${ci.n}" loading="lazy" onerror="iErr(this,'${ci.n}',0)">
      </div>
      <div><div class="ciname">${ci.n}</div><div class="ciwhy">${ci.w}</div></div>
    </div>`).join('');
  document.getElementById('mc').innerHTML=`
    <div class="mbanner" style="background:${s.grad}">
      <div class="mb-emoji">${h.icon}</div>
      ${hSrc(h.wn)?`<img class="mb-img" src="${hSrc(h.wn)}" alt="${h.name}" loading="lazy" onerror="hErr(this,'${h.wn.replace(/'/g,"\\'")}')">`:''}
      <div class="mb-grad" style="background:linear-gradient(90deg,${s.pipbg}f0 30%,transparent 70%),linear-gradient(0deg,rgba(0,0,15,.8),transparent)"></div>
      <div class="mb-info">
        <div class="mb-name">${h.name}</div>
        <div class="mb-roles">${h.roles.map(r=>`<span class="rbadge" style="background:${RS[r]?.pipbg||'#222'};color:${RS[r]?.pip||'#aaa'};border:1px solid ${RS[r]?.pip||'#444'}44">${r}</span>`).join('')}</div>
      </div>
    </div>
    <div class="mbody">
      <div class="stitle" style="color:#a855f7">⚔️ Best Build — Current Meta</div>
      <div class="build-grid">${buildHtml}</div>
      <div class="stitle" style="color:#4aff88;margin-top:18px">🏆 Matchups</div>
      <div class="ccols">
        <div class="clist"><h4 style="color:#4aff88">✅ Strong Against</h4>${h.strong.map(x=>`<span class="ctag">✔ ${x}</span>`).join('')||'<span style="color:#333">— general pick</span>'}</div>
        <div class="clist"><h4 style="color:#ff4a4a">❌ Weak Against</h4>${h.weak.map(x=>`<span class="ctag">✘ ${x}</span>`).join('')||'<span style="color:#333">— general pick</span>'}</div>
      </div>
      <div class="stitle" style="color:#ff8844;margin-top:18px">🛡️ How to Counter ${h.name}</div>
      ${ciHtml}
    </div>`;
  document.getElementById('mo').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function closeM(){document.getElementById('mo').classList.add('hidden');document.body.style.overflow='';}
function closeOut(e){if(e.target===document.getElementById('mo'))closeM();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});

// ── COUNTER TOOL ──────────────────────────────────────────────────
function addE(name){
  if(enemyTeam.length>=5||enemyTeam.find(h=>h.name===name))return;
  enemyTeam.push(heroList.find(h=>h.name===name));
  refresh();
}
function removeE(name){
  enemyTeam=enemyTeam.filter(h=>h.name!==name);
  refresh();
}
function refresh(){renderSlots();renderMG();renderCR();}

function renderSlots(){
  document.getElementById('eslots').innerHTML=[0,1,2,3,4].map(i=>{
    const h=enemyTeam[i];
    if(!h)return`<div class="eslot"><div class="sthumb">❓</div><span class="sname" style="color:#2a2a4a">Slot ${i+1}</span></div>`;
    const s=rs(h);
    return`<div class="eslot filled">
      <div class="sthumb" style="background:${s.grad}">
        <span class="sthumb-e">${h.icon}</span>
        ${hSrc(h.wn)?`<img class="sthumb-img" src="${hSrc(h.wn)}" alt="${h.name}" loading="lazy" onerror="hErr(this,'${h.wn.replace(/'/g,"\\'")}')">`:''}
      </div>
      <span class="sname">${h.name}</span>
      <span style="font-size:.6rem;color:${s.pip}">${h.roles[0]}</span>
      <button class="rbtn" onclick="removeE('${h.name.replace(/'/g,"\\'")}')">✕</button>
    </div>`;
  }).join('');
}

function renderMG(){
  const q=document.getElementById('es').value.toLowerCase();
  document.getElementById('mg').innerHTML=heroList.filter(h=>h.name.toLowerCase().includes(q)).map(h=>{
    const dis=!!enemyTeam.find(e=>e.name===h.name)||enemyTeam.length>=5;
    const s=rs(h);
    return`<div class="minicard${dis?' dis':''}" onclick="addE('${h.name.replace(/'/g,"\\'")}')">
      <div class="mthumb" style="background:${s.grad}">
        <span class="mthumb-e">${h.icon}</span>
        ${hSrc(h.wn)?`<img class="mthumb-img" src="${hSrc(h.wn)}" alt="${h.name}" loading="lazy" onerror="hErr(this,'${h.wn.replace(/'/g,"\\'")}')">`:''}
      </div>
      <div class="mname">${h.name}</div>
    </div>`;
  }).join('');
}

function renderCR(){
  const el=document.getElementById('cr');
  if(!enemyTeam.length){el.innerHTML=`<div class="empty"><div style="font-size:2rem;margin-bottom:8px">👈</div>Select enemy heroes to see counter item recommendations</div>`;return;}
  const sc={};
  enemyTeam.forEach(h=>{
    h.ci.forEach(ci=>{
      if(!sc[ci.n])sc[ci.n]={e:ci.e,name:ci.n,reasons:[],count:0,prio:'med'};
      sc[ci.n].reasons.push(`vs <b>${h.name}</b>: ${ci.w}`);
      sc[ci.n].count+=2;
    });
    h.roles.forEach(role=>{
      const ri={
        Tank:[{e:'🌑',n:'Malefic Roar',w:'Armor pen to shred tank defense',p:'high'},{e:'💠',n:'Divine Glaive',w:'Magic pen vs tanky supports',p:'med'}],
        Fighter:[{e:'❄️',n:'Dominance Ice',w:'Reduces attack speed & crits',p:'high'},{e:'🧲',n:'Antique Cuirass',w:'Reduces burst physical damage',p:'high'}],
        Assassin:[{e:'🔵',n:"Athena's Shield",w:'Absorbs burst combo window',p:'high'},{e:'💀',n:'Immortality',w:'Second life after getting burst',p:'high'}],
        Mage:[{e:'🌑',n:'Radiant Armor',w:'Reduces stacking magic damage',p:'high'},{e:'🔵',n:"Athena's Shield",w:'Absorbs magic burst window',p:'high'}],
        Marksman:[{e:'❄️',n:'Dominance Ice',w:'Reduces crit rate and attack speed',p:'high'},{e:'🛡️',n:'Blade Armor',w:'Returns crit damage to shooter',p:'med'}],
        Support:[{e:'⚡',n:'Necklace of Durance',w:'Reduces healing by 50%',p:'high'},{e:'🗡️',n:'Sea Halberd',w:'Reduces lifesteal and regen on hit',p:'high'}],
      }[role]||[];
      ri.forEach(r=>{
        if(!sc[r.n])sc[r.n]={e:r.e,name:r.n,reasons:[],count:0,prio:r.p};
        sc[r.n].reasons.push(`Effective vs ${role} (<b>${h.name}</b>): ${r.w}`);
        sc[r.n].count+=1;
        if(r.p==='high')sc[r.n].prio='high';
      });
    });
  });
  const sorted=Object.values(sc).sort((a,b)=>b.count-a.count).slice(0,8);
  el.innerHTML=sorted.map(item=>`
    <div class="crec">
      <div class="crec-h">
        <div class="crecbox">
          <span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1">${item.e}</span>
          <img class="crecbox-img" src="${iSrc(item.name)}" alt="${item.name}" loading="lazy" onerror="iErr(this,'${item.name}',0)">
        </div>
        <span class="crecname">${item.name}</span>
        <span class="prio ${item.prio==='high'?'ph':'pm'}">${item.prio==='high'?'🔴 HIGH':'🟡 MED'}</span>
      </div>
      <div class="crecreason">${[...new Set(item.reasons)].join('<br>')}</div>
    </div>`).join('')+
  `<div class="tip">💡 <b style="color:#ccc">Pro tip:</b> Pick 2–3 counter items that fit your hero's build. Always buy <span style="color:#ff6666">HIGH</span> priority items first. Rush anti-heal early vs Estes, Angela, or Uranus.</div>`;
}

// ── INIT ──────────────────────────────────────────────────────────
renderRF();renderH();renderSlots();renderMG();renderCR();
</script>
</body>
</html>
