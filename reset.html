<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset MLBB Builds Cache</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #080910;
      color: #f5f7fb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(520px, calc(100% - 32px));
      border: 1px solid #273044;
      border-radius: 8px;
      background: #10131d;
      padding: 24px;
      text-align: center;
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { color: #98a3b7; line-height: 1.5; }
  </style>
</head>
<body>
  <main>
    <h1>Refreshing Website</h1>
    <p>Clearing the old app cache and loading the newest MLBB Builds & Counters.</p>
  </main>
  <script>
    async function reset() {
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(registration => registration.unregister()));
      }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(key => caches.delete(key)));
      }
      location.replace('./?fresh=' + Date.now());
    }
    reset().catch(() => location.replace('./?fresh=' + Date.now()));
  </script>
</body>
</html>
